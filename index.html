<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="On a Roll">
  <meta name="theme-color" content="#7d2645">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>On a Roll</title>
  <style>
    :root {
      --burgundy: #7d2645;
      --burgundy-dark: #5c1a32;
      --pink-bg: #f9f0f3;
      --dare: #d4521f;
      --drink: #c73d6b;
      --fun: #2e9e52;
      --rule: #6b3fa0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--pink-bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
      gap: 0;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 48px; }
    .header-emoji { font-size: 30px; letter-spacing: 6px; }
    .title {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic; font-size: 40px; font-weight: bold;
      color: var(--burgundy); line-height: 1.1; margin-top: 6px;
    }
    .subtitle {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      color: rgba(125,38,69,0.55); text-transform: uppercase; margin-top: 6px;
    }

    /* ── Dice ── */
    .dice-wrap { display: flex; flex-direction: column; align-items: center; gap: 32px; }
    .dice-row  { display: flex; gap: 24px; }

    .die {
      width: 110px; height: 110px;
      background: var(--burgundy);
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(125,38,69,0.45);
      display: grid;
      grid-template-areas: "tl . tr" "ml c mr" "bl . br";
      padding: 18px; gap: 0;
    }
    .die.rolling { animation: shake 0.08s infinite alternate; }
    @keyframes shake {
      from { transform: rotate(-14deg) scale(1.07); }
      to   { transform: rotate(14deg)  scale(1.07); }
    }
    .dot {
      width: 16px; height: 16px; background: white;
      border-radius: 50%; align-self: center; justify-self: center; display: none;
    }
    .die[data-val="1"] .dot-c,
    .die[data-val="2"] .dot-tl,.die[data-val="2"] .dot-br,
    .die[data-val="3"] .dot-tl,.die[data-val="3"] .dot-c,.die[data-val="3"] .dot-br,
    .die[data-val="4"] .dot-tl,.die[data-val="4"] .dot-tr,.die[data-val="4"] .dot-bl,.die[data-val="4"] .dot-br,
    .die[data-val="5"] .dot-tl,.die[data-val="5"] .dot-tr,.die[data-val="5"] .dot-c,.die[data-val="5"] .dot-bl,.die[data-val="5"] .dot-br,
    .die[data-val="6"] .dot-tl,.die[data-val="6"] .dot-tr,.die[data-val="6"] .dot-ml,.die[data-val="6"] .dot-mr,.die[data-val="6"] .dot-bl,.die[data-val="6"] .dot-br
    { display: block; }
    .dot-tl{grid-area:tl}.dot-tr{grid-area:tr}.dot-ml{grid-area:ml}
    .dot-c{grid-area:c}.dot-mr{grid-area:mr}.dot-bl{grid-area:bl}.dot-br{grid-area:br}

    /* ── Button ── */
    .roll-btn {
      width: 260px;
      background: var(--burgundy); color: white; border: none;
      border-radius: 16px; padding: 18px 0;
      font-size: 16px; font-weight: 700; letter-spacing: 1.8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
      box-shadow: 0 6px 20px rgba(125,38,69,0.4);
    }
    .roll-btn:active { background: var(--burgundy-dark); transform: scale(0.97); }
    .roll-btn:disabled { opacity: 0.55; }

    /* ── Install hint ── */
    .install-hint {
      margin-top: 28px; text-align: center;
      font-size: 11px; color: rgba(125,38,69,0.5); display: none;
    }
    .install-hint.show { display: block; }

    /* ── Bottom-sheet overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: flex-end;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .sheet {
      background: var(--pink-bg); width: 100%;
      border-radius: 28px 28px 0 0;
      padding: 14px 24px calc(36px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.34,1.4,0.64,1);
    }
    .overlay.show .sheet { transform: translateY(0); }

    .drag-handle {
      width: 40px; height: 5px; background: rgba(0,0,0,0.18);
      border-radius: 3px; margin: 0 auto 18px;
    }

    /* mini dice in sheet */
    .sheet-dice-row {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 20px;
    }
    .mini-die {
      width: 52px; height: 52px; background: var(--burgundy);
      border-radius: 12px; box-shadow: 0 3px 8px rgba(125,38,69,0.35);
      display: grid;
      grid-template-areas: "tl . tr" "ml c mr" "bl . br";
      padding: 8px; gap: 0;
    }
    .mini-dot {
      width: 8px; height: 8px; background: white;
      border-radius: 50%; align-self: center; justify-self: center; display: none;
    }
    .mini-die[data-val="1"] .mdot-c,
    .mini-die[data-val="2"] .mdot-tl,.mini-die[data-val="2"] .mdot-br,
    .mini-die[data-val="3"] .mdot-tl,.mini-die[data-val="3"] .mdot-c,.mini-die[data-val="3"] .mdot-br,
    .mini-die[data-val="4"] .mdot-tl,.mini-die[data-val="4"] .mdot-tr,.mini-die[data-val="4"] .mdot-bl,.mini-die[data-val="4"] .mdot-br,
    .mini-die[data-val="5"] .mdot-tl,.mini-die[data-val="5"] .mdot-tr,.mini-die[data-val="5"] .mdot-c,.mini-die[data-val="5"] .mdot-bl,.mini-die[data-val="5"] .mdot-br,
    .mini-die[data-val="6"] .mdot-tl,.mini-die[data-val="6"] .mdot-tr,.mini-die[data-val="6"] .mdot-ml,.mini-die[data-val="6"] .mdot-mr,.mini-die[data-val="6"] .mdot-bl,.mini-die[data-val="6"] .mdot-br
    { display: block; }
    .mdot-tl{grid-area:tl}.mdot-tr{grid-area:tr}.mdot-ml{grid-area:ml}
    .mdot-c{grid-area:c}.mdot-mr{grid-area:mr}.mdot-bl{grid-area:bl}.mdot-br{grid-area:br}
    .sheet-plus { font-size: 20px; color: var(--burgundy); font-weight: 300; }

    /* result card */
    .result-card {
      background: white; border-radius: 20px;
      padding: 28px 20px; text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      margin-bottom: 16px;
    }
    .result-badge {
      display: inline-block; font-size: 12px; font-weight: 800;
      letter-spacing: 1px; border-radius: 8px; padding: 5px 16px; margin-bottom: 14px;
    }
    .result-emoji { font-size: 62px; display: block; margin-bottom: 12px; }
    .result-text {
      font-size: 22px; font-weight: 700; color: rgba(0,0,0,0.85); line-height: 1.3;
    }

    .got-it-btn {
      width: 100%; background: var(--burgundy); color: white; border: none;
      border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700;
      cursor: pointer; -webkit-appearance: none;
      transition: background 0.15s, transform 0.1s;
    }
    .got-it-btn:active { background: var(--burgundy-dark); transform: scale(0.98); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-emoji">🪩 🍸 💃</div>
    <div class="title">On a Roll</div>
    <div class="subtitle">A Bachelorette Drinking Game</div>
  </div>

  <div class="dice-wrap">
    <div class="dice-row">
      <div class="die" id="die1" data-val="1">
        <div class="dot dot-tl"></div><div class="dot dot-tr"></div>
        <div class="dot dot-ml"></div><div class="dot dot-c"></div><div class="dot dot-mr"></div>
        <div class="dot dot-bl"></div><div class="dot dot-br"></div>
      </div>
      <div class="die" id="die2" data-val="1">
        <div class="dot dot-tl"></div><div class="dot dot-tr"></div>
        <div class="dot dot-ml"></div><div class="dot dot-c"></div><div class="dot dot-mr"></div>
        <div class="dot dot-bl"></div><div class="dot dot-br"></div>
      </div>
    </div>
    <button class="roll-btn" id="rollBtn">🎲 ROLL THE DICE</button>
  </div>

  <div class="install-hint" id="installHint">
    Tap <strong>Share ↑</strong> → <strong>Add to Home Screen</strong> to install
  </div>

  <!-- Result bottom sheet -->
  <div class="overlay" id="overlay">
    <div class="sheet">
      <div class="drag-handle"></div>
      <div class="sheet-dice-row">
        <div class="mini-die" id="mDie1" data-val="1">
          <div class="mini-dot mdot-tl"></div><div class="mini-dot mdot-tr"></div>
          <div class="mini-dot mdot-ml"></div><div class="mini-dot mdot-c"></div><div class="mini-dot mdot-mr"></div>
          <div class="mini-dot mdot-bl"></div><div class="mini-dot mdot-br"></div>
        </div>
        <span class="sheet-plus">+</span>
        <div class="mini-die" id="mDie2" data-val="1">
          <div class="mini-dot mdot-tl"></div><div class="mini-dot mdot-tr"></div>
          <div class="mini-dot mdot-ml"></div><div class="mini-dot mdot-c"></div><div class="mini-dot mdot-mr"></div>
          <div class="mini-dot mdot-bl"></div><div class="mini-dot mdot-br"></div>
        </div>
      </div>
      <div class="result-card" id="resultCard">
        <span class="result-badge" id="resultBadge"></span>
        <span class="result-emoji" id="resultEmoji"></span>
        <span class="result-text" id="resultText"></span>
      </div>
      <button class="got-it-btn" id="gotItBtn">Got it! 🎉</button>
    </div>
  </div>

<script>
const CARDS = [
  [{t:'DARE',e:'🎤',x:'30-sec speech about the bride'},
   {t:'DRINK',e:'👑',x:'Maid of Honour drinks'},
   {t:'FUN',e:'🥂',x:'Make a toast — group picks the topic'},
   {t:'DRINK',e:'💒',x:'Drink if you have more than 1 friend getting married this year'},
   {t:'DARE',e:'📸',x:'Say "Cheese!" — photo with the bride'},
   {t:'FUN',e:'❓',x:'Truth or Dare'}],
  [{t:'FUN',e:'👯',x:'Pick 2 to drink with you'},
   {t:'DRINK',e:'🏢',x:'Drink if you work in Alison'},
   {t:'RULE',e:'🎲',x:'Roll again — lucky you!'},
   {t:'DRINK',e:'🔋',x:'Lowest phone battery drinks'},
   {t:'DRINK',e:'🎉',x:'Everybody drink up!'},
   {t:'DARE',e:'💃',x:'Dance It Out — show your best move'}],
  [{t:'DRINK',e:'🔤',x:'Drink if you have a middle name'},
   {t:'DRINK',e:'💍',x:"Drink if you're married or engaged"},
   {t:'DARE',e:'🎵',x:'15-sec karaoke — your fave Bollywood banger'},
   {t:'FUN',e:'🌙',x:'Last to point finger to sky drinks'},
   {t:'DRINK',e:'💒',x:"Drink for every wedding you're attending this year"},
   {t:'FUN',e:'✌️',x:'Two Truths & a Lie'}],
  [{t:'RULE',e:'📜',x:'Make a rule everyone follows all game'},
   {t:'DRINK',e:'🔨',x:"Drink if you've supervised a kitchen remodelling"},
   {t:'FUN',e:'🤝',x:'Choose a mate — they drink when you drink'},
   {t:'FUN',e:'🎶',x:'Rhyme Time — first to pause drinks'},
   {t:'FUN',e:'💋',x:'Kiss Marry Kill'},
   {t:'DRINK',e:'🏖️',x:"Drink if you've hooked up in Goa"}],
  [{t:'FUN',e:'🎁',x:'Give out one drink'},
   {t:'DARE',e:'🤫',x:'Spill Your Secrets — share a wild hookup story'},
   {t:'FUN',e:'🤚',x:'Never Have I Ever — 3 fingers'},
   {t:'FUN',e:'💡',x:'Categories — first to fail drinks'},
   {t:'DRINK',e:'😬',x:"Respect Your Elders — drink if you're older than the bride"},
   {t:'DRINK',e:'🎬',x:'Drink if your partner has a Hindi film named after them'}],
  [{t:'DRINK',e:'✈️',x:"Drink if you've been to Goa before"},
   {t:'FUN',e:'📱',x:'Read your last text message out loud'},
   {t:'DARE',e:'🔥',x:'Hot Seat — everyone asks the bride one question'},
   {t:'DRINK',e:'🍺',x:'Finish your drink!'},
   {t:'FUN',e:'😂',x:'Tell a funny story about the bride'},
   {t:'FUN',e:'😇',x:'Two Truths & a Lie — bride edition'}],
];
const TYPE_COLOR={DARE:'#d4521f',DRINK:'#c73d6b',FUN:'#2e9e52',RULE:'#6b3fa0'};

let rolling = false;

function rollDice() {
  if (rolling) return;
  rolling = true;
  document.getElementById('rollBtn').disabled = true;
  const d1 = document.getElementById('die1');
  const d2 = document.getElementById('die2');
  d1.classList.add('rolling');
  d2.classList.add('rolling');
  let ticks = 16;
  const iv = setInterval(() => {
    d1.dataset.val = Math.ceil(Math.random() * 6);
    d2.dataset.val = Math.ceil(Math.random() * 6);
    if (--ticks <= 0) {
      clearInterval(iv);
      const f1 = Math.ceil(Math.random() * 6);
      const f2 = Math.ceil(Math.random() * 6);
      d1.dataset.val = f1;
      d2.dataset.val = f2;
      d1.classList.remove('rolling');
      d2.classList.remove('rolling');
      rolling = false;
      document.getElementById('rollBtn').disabled = false;
      setTimeout(() => showResult(f1, f2), 300);
    }
  }, 70);
}

function showResult(r, c) {
  const card = CARDS[r-1][c-1];
  document.getElementById('mDie1').dataset.val = r;
  document.getElementById('mDie2').dataset.val = c;
  const badge = document.getElementById('resultBadge');
  badge.textContent = card.t;
  badge.style.color = TYPE_COLOR[card.t];
  badge.style.background = TYPE_COLOR[card.t] + '18';
  document.getElementById('resultEmoji').textContent = card.e;
  document.getElementById('resultText').textContent = card.x;
  const rc = document.getElementById('resultCard');
  rc.style.boxShadow = `0 4px 24px ${TYPE_COLOR[card.t]}28`;
  rc.style.border = `1.5px solid ${TYPE_COLOR[card.t]}35`;
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function hideResult() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('rollBtn').addEventListener('click', rollDice);
document.getElementById('gotItBtn').addEventListener('click', hideResult);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) hideResult();
});

if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone)
  document.getElementById('installHint').classList.add('show');

if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
