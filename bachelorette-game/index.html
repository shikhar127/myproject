<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="On a Roll">
  <meta name="theme-color" content="#7d2645">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>On a Roll</title>
  <style>
    :root {
      --burgundy: #7d2645;
      --burgundy-dark: #5c1a32;
      --pink-bg: #f9f0f3;
      --card-bg: #fff;
      --border: #e8d0da;
      --dare: #d4521f;
      --drink: #c73d6b;
      --fun: #2e9e52;
      --rule: #6b3fa0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--pink-bg);
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 20px 16px 12px;
    }
    .header-emoji { font-size: 28px; letter-spacing: 4px; }
    .title {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 36px;
      font-weight: bold;
      color: var(--burgundy);
      line-height: 1.1;
      margin-top: 4px;
    }
    .subtitle {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: rgba(125,38,69,0.65);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Dice Section ── */
    .dice-section {
      background: #fff;
      margin: 0 14px 16px;
      border-radius: 20px;
      padding: 20px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .dice-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
    }
    .die {
      width: 88px;
      height: 88px;
      background: var(--burgundy);
      border-radius: 18px;
      box-shadow: 0 4px 12px rgba(125,38,69,0.4);
      display: grid;
      grid-template-areas:
        "tl . tr"
        "ml c mr"
        "bl . br";
      padding: 14px;
      gap: 0;
      transition: transform 0.07s ease;
      position: relative;
    }
    .die.rolling { animation: shake 0.07s infinite alternate; }
    @keyframes shake {
      from { transform: rotate(-12deg) scale(1.05); }
      to   { transform: rotate(12deg)  scale(1.05); }
    }
    .dot {
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      align-self: center;
      justify-self: center;
      display: none;
    }
    /* dot positions */
    .die[data-val="1"] .dot-c,
    .die[data-val="2"] .dot-tl, .die[data-val="2"] .dot-br,
    .die[data-val="3"] .dot-tl, .die[data-val="3"] .dot-c, .die[data-val="3"] .dot-br,
    .die[data-val="4"] .dot-tl, .die[data-val="4"] .dot-tr, .die[data-val="4"] .dot-bl, .die[data-val="4"] .dot-br,
    .die[data-val="5"] .dot-tl, .die[data-val="5"] .dot-tr, .die[data-val="5"] .dot-c, .die[data-val="5"] .dot-bl, .die[data-val="5"] .dot-br,
    .die[data-val="6"] .dot-tl, .die[data-val="6"] .dot-tr, .die[data-val="6"] .dot-ml, .die[data-val="6"] .dot-mr, .die[data-val="6"] .dot-bl, .die[data-val="6"] .dot-br
    { display: block; }

    .dot-tl { grid-area: tl; }
    .dot-tr { grid-area: tr; }
    .dot-ml { grid-area: ml; }
    .dot-c  { grid-area: c;  }
    .dot-mr { grid-area: mr; }
    .dot-bl { grid-area: bl; }
    .dot-br { grid-area: br; }

    .roll-btn {
      width: 100%;
      background: var(--burgundy);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }
    .roll-btn:active { background: var(--burgundy-dark); transform: scale(0.98); }
    .roll-btn:disabled { opacity: 0.6; }

    /* ── Grid ── */
    .grid-wrap { padding: 0 8px 30px; }
    .grid-table { width: 100%; border-collapse: separate; border-spacing: 3px; }

    .header-cell {
      width: 38px;
      height: 38px;
      background: var(--burgundy);
      border-radius: 8px;
      padding: 4px;
      position: relative;
      transition: box-shadow 0.2s;
    }
    .header-cell.lit {
      background: rgba(255,220,50,0.25);
      box-shadow: 0 0 0 2px #f5c518;
    }
    .hdie {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-areas:
        "tl . tr"
        "ml c mr"
        "bl . br";
      padding: 3px;
    }
    .hdot {
      width: 7px;
      height: 7px;
      background: white;
      border-radius: 50%;
      align-self: center;
      justify-self: center;
      display: none;
    }
    .header-cell.lit .hdot { background: #333; }

    .hdie[data-val="1"] .hdot-c,
    .hdie[data-val="2"] .hdot-tl, .hdie[data-val="2"] .hdot-br,
    .hdie[data-val="3"] .hdot-tl, .hdie[data-val="3"] .hdot-c, .hdie[data-val="3"] .hdot-br,
    .hdie[data-val="4"] .hdot-tl, .hdie[data-val="4"] .hdot-tr, .hdie[data-val="4"] .hdot-bl, .hdie[data-val="4"] .hdot-br,
    .hdie[data-val="5"] .hdot-tl, .hdie[data-val="5"] .hdot-tr, .hdie[data-val="5"] .hdot-c, .hdie[data-val="5"] .hdot-bl, .hdie[data-val="5"] .hdot-br,
    .hdie[data-val="6"] .hdot-tl, .hdie[data-val="6"] .hdot-tr, .hdie[data-val="6"] .hdot-ml, .hdie[data-val="6"] .hdot-mr, .hdie[data-val="6"] .hdot-bl, .hdie[data-val="6"] .hdot-br
    { display: block; }

    .hdot-tl { grid-area: tl; }
    .hdot-tr { grid-area: tr; }
    .hdot-ml { grid-area: ml; }
    .hdot-c  { grid-area: c;  }
    .hdot-mr { grid-area: mr; }
    .hdot-bl { grid-area: bl; }
    .hdot-br { grid-area: br; }

    .card-cell {
      background: var(--card-bg);
      border-radius: 8px;
      border: 0.5px solid var(--border);
      padding: 5px 3px;
      text-align: center;
      vertical-align: top;
      cursor: default;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      min-height: 70px;
    }
    .card-cell.lit {
      background: rgba(245,197,24,0.2);
      border: 2px solid #f5c518;
      transform: scale(1.06);
      box-shadow: 0 3px 10px rgba(245,197,24,0.35);
      cursor: pointer;
      z-index: 1;
      position: relative;
    }
    .card-cell:active { opacity: 0.8; }

    .badge {
      display: inline-block;
      font-size: 6.5px;
      font-weight: 800;
      letter-spacing: 0.5px;
      border-radius: 3px;
      padding: 1px 4px;
      margin-bottom: 2px;
    }
    .badge-DARE  { color: var(--dare);  background: rgba(212,82,31,0.12); }
    .badge-DRINK { color: var(--drink); background: rgba(199,61,107,0.12); }
    .badge-FUN   { color: var(--fun);   background: rgba(46,158,82,0.12); }
    .badge-RULE  { color: var(--rule);  background: rgba(107,63,160,0.12); }

    .card-emoji { font-size: 14px; display: block; margin: 1px 0; }
    .card-text {
      font-size: 6.5px;
      font-weight: 500;
      color: rgba(0,0,0,0.72);
      line-height: 1.35;
      display: block;
      word-break: break-word;
    }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--pink-bg);
      width: 100%;
      border-radius: 24px 24px 0 0;
      padding: 12px 24px 32px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .overlay.show .modal { transform: translateY(0); }

    .drag-handle {
      width: 40px; height: 5px;
      background: rgba(0,0,0,0.2);
      border-radius: 3px;
      margin: 0 auto 14px;
    }
    .modal-roll-label {
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: rgba(125,38,69,0.65);
      margin-bottom: 14px;
    }
    .modal-dice-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .modal-plus { font-size: 24px; color: var(--burgundy); font-weight: 300; }

    .result-card {
      background: white;
      border-radius: 18px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    .result-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      border-radius: 8px;
      padding: 4px 14px;
      margin-bottom: 12px;
    }
    .result-emoji { font-size: 56px; display: block; margin-bottom: 10px; }
    .result-text {
      font-size: 20px;
      font-weight: 700;
      color: rgba(0,0,0,0.85);
      line-height: 1.3;
    }

    .got-it-btn {
      width: 100%;
      background: var(--burgundy);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      -webkit-appearance: none;
      transition: background 0.15s, transform 0.1s;
    }
    .got-it-btn:active { background: var(--burgundy-dark); transform: scale(0.98); }

    /* ── iOS install banner ── */
    .install-hint {
      text-align: center;
      font-size: 11px;
      color: rgba(125,38,69,0.55);
      padding: 0 20px 14px;
      display: none;
    }
    .install-hint.show { display: block; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-emoji">🪩 🍸 💃</div>
  <div class="title">On a Roll</div>
  <div class="subtitle">A Bachelorette Drinking Game</div>
</div>

<!-- Install hint (shown only in mobile Safari before install) -->
<div class="install-hint" id="installHint">
  Tap <strong>Share</strong> → <strong>Add to Home Screen</strong> to install
</div>

<!-- Dice -->
<div class="dice-section">
  <div class="dice-row">
    <div class="die" id="die1" data-val="1">
      <div class="dot dot-tl"></div><div class="dot dot-tr"></div>
      <div class="dot dot-ml"></div><div class="dot dot-c"></div><div class="dot dot-mr"></div>
      <div class="dot dot-bl"></div><div class="dot dot-br"></div>
    </div>
    <div class="die" id="die2" data-val="1">
      <div class="dot dot-tl"></div><div class="dot dot-tr"></div>
      <div class="dot dot-ml"></div><div class="dot dot-c"></div><div class="dot dot-mr"></div>
      <div class="dot dot-bl"></div><div class="dot dot-br"></div>
    </div>
  </div>
  <button class="roll-btn" id="rollBtn">🎲 ROLL THE DICE</button>
</div>

<!-- Grid -->
<div class="grid-wrap">
  <table class="grid-table" id="grid"></table>
</div>

<!-- Result Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-roll-label" id="modalLabel">You rolled …</div>
    <div class="modal-dice-row">
      <div class="die" id="mDie1" data-val="1">
        <div class="dot dot-tl"></div><div class="dot dot-tr"></div>
        <div class="dot dot-ml"></div><div class="dot dot-c"></div><div class="dot dot-mr"></div>
        <div class="dot dot-bl"></div><div class="dot dot-br"></div>
      </div>
      <div class="modal-plus">+</div>
      <div class="die" id="mDie2" data-val="1">
        <div class="dot dot-tl"></div><div class="dot dot-tr"></div>
        <div class="dot dot-ml"></div><div class="dot dot-c"></div><div class="dot dot-mr"></div>
        <div class="dot dot-bl"></div><div class="dot dot-br"></div>
      </div>
    </div>
    <div class="result-card" id="resultCard">
      <span class="result-badge" id="resultBadge"></span>
      <span class="result-emoji" id="resultEmoji"></span>
      <span class="result-text" id="resultText"></span>
    </div>
    <button class="got-it-btn" id="gotItBtn">Got it! 🎉</button>
  </div>
</div>

<script>
const CARDS = [
  // Row 1 (die1=1)
  [{t:'DARE',  e:'🎤', x:'30-sec speech about the bride'},
   {t:'DRINK', e:'👑', x:'Maid of Honour drinks'},
   {t:'FUN',   e:'🥂', x:'Make a toast — group picks the topic'},
   {t:'DRINK', e:'💒', x:'Drink if you have more than 1 friend getting married this year'},
   {t:'DARE',  e:'📸', x:'Say "Cheese!" — photo with the bride'},
   {t:'FUN',   e:'❓', x:'Truth or Dare'}],
  // Row 2
  [{t:'FUN',   e:'👯', x:'Pick 2 to drink with you'},
   {t:'DRINK', e:'🏢', x:'Drink if you work in Alison'},
   {t:'RULE',  e:'🎲', x:'Roll again — lucky you!'},
   {t:'DRINK', e:'🔋', x:'Lowest phone battery drinks'},
   {t:'DRINK', e:'🎉', x:'Everybody drink up!'},
   {t:'DARE',  e:'💃', x:'Dance It Out — show your best move'}],
  // Row 3
  [{t:'DRINK', e:'🔤', x:'Drink if you have a middle name'},
   {t:'DRINK', e:'💍', x:'Drink if you\'re married or engaged'},
   {t:'DARE',  e:'🎵', x:'15-sec karaoke — your fave Bollywood banger'},
   {t:'FUN',   e:'🌙', x:'Last to point finger to sky drinks'},
   {t:'DRINK', e:'💒', x:'Drink for every wedding you\'re attending this year'},
   {t:'FUN',   e:'✌️', x:'Two Truths & a Lie'}],
  // Row 4
  [{t:'RULE',  e:'📜', x:'Make a rule everyone follows all game'},
   {t:'DRINK', e:'🔨', x:'Drink if you\'ve supervised a kitchen remodelling'},
   {t:'FUN',   e:'🤝', x:'Choose a mate — they drink when you drink'},
   {t:'FUN',   e:'🎶', x:'Rhyme Time — first to pause drinks'},
   {t:'FUN',   e:'💋', x:'Kiss Marry Kill'},
   {t:'DRINK', e:'🏖️', x:'Drink if you\'ve hooked up in Goa'}],
  // Row 5
  [{t:'FUN',   e:'🎁', x:'Give out one drink'},
   {t:'DARE',  e:'🤫', x:'Spill Your Secrets — share a wild hookup story'},
   {t:'FUN',   e:'🤚', x:'Never Have I Ever — 3 fingers'},
   {t:'FUN',   e:'💡', x:'Categories — first to fail drinks'},
   {t:'DRINK', e:'😬', x:'Respect Your Elders — drink if you\'re older than the bride'},
   {t:'DRINK', e:'🎬', x:'Drink if your partner has a Hindi film named after them'}],
  // Row 6
  [{t:'DRINK', e:'✈️', x:'Drink if you\'ve been to Goa before'},
   {t:'FUN',   e:'📱', x:'Read your last text message out loud'},
   {t:'DARE',  e:'🔥', x:'Hot Seat — everyone asks the bride one question'},
   {t:'DRINK', e:'🍺', x:'Finish your drink!'},
   {t:'FUN',   e:'😂', x:'Tell a funny story about the bride'},
   {t:'FUN',   e:'😇', x:'Two Truths & a Lie — bride edition'}],
];

const TYPE_COLOR = { DARE:'#d4521f', DRINK:'#c73d6b', FUN:'#2e9e52', RULE:'#6b3fa0' };

function dieDots(val) {
  return `<div class="hdie" data-val="${val}">
    <div class="hdot hdot-tl"></div><div class="hdot hdot-tr"></div>
    <div class="hdot hdot-ml"></div><div class="hdot hdot-c"></div><div class="hdot hdot-mr"></div>
    <div class="hdot hdot-bl"></div><div class="hdot hdot-br"></div>
  </div>`;
}

// Build grid
function buildGrid() {
  const tbl = document.getElementById('grid');
  // Header row
  let hr = '<tr><td style="width:42px"></td>';
  for (let c = 1; c <= 6; c++) {
    hr += `<td><div class="header-cell" id="hcol${c}">${dieDots(c)}</div></td>`;
  }
  hr += '</tr>';
  tbl.innerHTML = hr;

  for (let r = 1; r <= 6; r++) {
    let row = `<tr><td><div class="header-cell" id="hrow${r}">${dieDots(r)}</div></td>`;
    for (let c = 1; c <= 6; c++) {
      const card = CARDS[r-1][c-1];
      row += `<td><div class="card-cell" id="cell${r}_${c}">
        <span class="badge badge-${card.t}">${card.t}</span>
        <span class="card-emoji">${card.e}</span>
        <span class="card-text">${card.x}</span>
      </div></td>`;
    }
    row += '</tr>';
    tbl.innerHTML += row;
  }

  // Tap lit cell to re-open modal
  for (let r = 1; r <= 6; r++)
    for (let c = 1; c <= 6; c++)
      document.getElementById(`cell${r}_${c}`).addEventListener('click', () => {
        if (document.getElementById(`cell${r}_${c}`).classList.contains('lit')) showModal(r, c);
      });
}

// Dice rolling
let currentD1 = 1, currentD2 = 1, rolling = false;

function setDie(el, val) {
  el.dataset.val = val;
  // force redraw dots
  el.querySelectorAll('.dot').forEach(d => d.style.display = '');
}

function rollDice() {
  if (rolling) return;
  rolling = true;
  document.getElementById('rollBtn').disabled = true;

  // Clear previous highlights
  document.querySelectorAll('.lit').forEach(el => el.classList.remove('lit'));

  const die1 = document.getElementById('die1');
  const die2 = document.getElementById('die2');
  die1.classList.add('rolling');
  die2.classList.add('rolling');

  let ticks = 14;
  const interval = setInterval(() => {
    const v1 = Math.ceil(Math.random() * 6);
    const v2 = Math.ceil(Math.random() * 6);
    die1.dataset.val = v1;
    die2.dataset.val = v2;
    ticks--;
    if (ticks <= 0) {
      clearInterval(interval);
      const f1 = Math.ceil(Math.random() * 6);
      const f2 = Math.ceil(Math.random() * 6);
      die1.dataset.val = f1;
      die2.dataset.val = f2;
      die1.classList.remove('rolling');
      die2.classList.remove('rolling');
      currentD1 = f1; currentD2 = f2;
      rolling = false;
      document.getElementById('rollBtn').disabled = false;

      // Highlight
      document.getElementById(`hrow${f1}`).classList.add('lit');
      document.getElementById(`hcol${f2}`).classList.add('lit');
      document.getElementById(`cell${f1}_${f2}`).classList.add('lit');

      setTimeout(() => showModal(f1, f2), 280);
    }
  }, 70);
}

function showModal(r, c) {
  const card = CARDS[r-1][c-1];
  document.getElementById('modalLabel').textContent = `You rolled ${r} + ${c}!`;
  document.getElementById('mDie1').dataset.val = r;
  document.getElementById('mDie2').dataset.val = c;

  const badge = document.getElementById('resultBadge');
  badge.textContent = card.t;
  badge.style.color = TYPE_COLOR[card.t];
  badge.style.background = TYPE_COLOR[card.t] + '1a';

  document.getElementById('resultEmoji').textContent = card.e;
  document.getElementById('resultText').textContent = card.x;

  const rc = document.getElementById('resultCard');
  rc.style.boxShadow = `0 4px 20px ${TYPE_COLOR[card.t]}30`;
  rc.style.border = `1.5px solid ${TYPE_COLOR[card.t]}40`;

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function hideModal() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('rollBtn').addEventListener('click', rollDice);
document.getElementById('gotItBtn').addEventListener('click', hideModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) hideModal();
});

buildGrid();

// Show install hint in mobile Safari (not standalone)
if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone) {
  document.getElementById('installHint').classList.add('show');
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
